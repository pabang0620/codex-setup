# oh-my-codex top-level settings (must be before any [table])
model_reasoning_effort = "medium"
developer_instructions = "You have oh-my-codex installed. AGENTS.md is the orchestration brain and main control surface. Follow AGENTS.md for skill/keyword routing, $name workflow invocation, and role-specialized subagents. Use outcome-first, concise progress updates: state the target result, constraints, validation evidence, and stop condition before adding process detail. Native subagents live in .codex/agents and may handle independent parallel subtasks within one Codex session or team pane. Skills load from .codex/skills, not native-agent TOMLs. Treat installed prompts as narrower execution surfaces under AGENTS.md authority."

model = "gpt-5.5"
model_context_window = 250000
model_auto_compact_token_limit = 200000

[features]
multi_agent = true
child_agents_md = true
hooks = true
goals = true

[shell_environment_policy.set]
USE_OMX_EXPLORE_CMD = "1"

[agents]
max_threads = 6
max_depth = 2

[tui]
status_line = ["model-with-reasoning", "git-branch", "context-remaining", "total-input-tokens", "total-output-tokens", "five-hour-limit", "weekly-limit"]
